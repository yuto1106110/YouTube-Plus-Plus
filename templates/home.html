<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Plus⁺</title>
    <link rel="icon" href="/img/logo/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f9f9f9; --bg-card: #f2f2f2; --text: #0f0f0f;
            --text-sub: #606060; --topbar-bg: #ffffff;
            --topbar-shadow: 0 1px 3px rgba(0,0,0,0.15);
            --input-bg: #f2f2f2; --input-border: #ccc; --link: #065fd4;
            --border: rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f; --bg-card: #272727; --text: #ffffff;
                --text-sub: #aaaaaa; --topbar-bg: #212121;
                --topbar-shadow: 0 1px 3px rgba(0,0,0,0.5);
                --input-bg: #121212; --input-border: #444; --link: #3ea6ff;
                --border: rgba(255,255,255,0.1);
            }
        }
        html[data-theme="light"] {
            --bg: #f9f9f9; --bg-card: #f2f2f2; --text: #0f0f0f;
            --text-sub: #606060; --topbar-bg: #ffffff; --link: #065fd4;
            --input-bg: #f2f2f2; --input-border: #ccc;
            --border: rgba(0,0,0,0.1); color-scheme: light;
        }
        html[data-theme="dark"] {
            --bg: #0f0f0f; --bg-card: #272727; --text: #ffffff;
            --text-sub: #aaaaaa; --topbar-bg: #212121; --link: #3ea6ff;
            --input-bg: #121212; --input-border: #444;
            --border: rgba(255,255,255,0.1); color-scheme: dark;
        }
        body { font-family: Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* トップバー */
        #top-bar {
            display: flex; align-items: center; gap: 8px;
            background: var(--topbar-bg); height: 56px; padding: 0 12px;
            box-shadow: var(--topbar-shadow);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }
        #hamburger-btn {
            flex-shrink: 0; background: none; border: none;
            cursor: pointer; padding: 6px; color: var(--text);
            font-size: 20px; border-radius: 6px;
        }
        #hamburger-btn:hover { background: rgba(128,128,128,0.15); }
        #top-bar img { height: 28px; }

        /* サイドメニュー */
        #side-menu {
            position: fixed; top: 0; left: -260px; width: 260px; height: 100vh;
            background: var(--topbar-bg); z-index: 2000;
            box-shadow: 2px 0 16px rgba(0,0,0,0.3);
            transition: left 0.25s ease;
        }
        #side-menu.open { left: 0; }
        #menu-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4); z-index: 1999;
        }
        #menu-overlay.open { display: block; }
        .side-menu-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; height: 56px;
            border-bottom: 1px solid var(--border);
        }
        .side-menu-header img { height: 28px; }
        .side-menu-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px; color: var(--text);
            text-decoration: none; font-size: 14px;
            transition: background 0.15s;
        }
        .side-menu-item:hover { background: rgba(128,128,128,0.1); }
        .side-menu-item .icon { font-size: 20px; width: 24px; text-align: center; }

        /* メインコンテンツ */
        .main {
            margin-top: 56px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: calc(100vh - 56px);
            padding: 20px; text-align: center;
        }

        /* ロゴ・タイトル */
        .home-logo {
            width: 80px; height: 80px; margin-bottom: 16px;
            animation: fadeInDown 0.6s ease;
        }
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .home-title {
            font-size: 36px; font-weight: 900;
            margin-bottom: 8px; letter-spacing: -1px;
            animation: fadeInDown 0.7s ease;
        }
        @media (max-width: 480px) { .home-title { font-size: 28px; } }
        .home-subtitle {
            font-size: 14px; color: var(--text-sub);
            margin-bottom: 32px;
            animation: fadeInDown 0.8s ease;
        }

        /* 検索バー */
        .home-search {
            width: 100%; max-width: 560px;
            display: flex; margin-bottom: 24px;
            animation: fadeInDown 0.9s ease;
        }
        .home-search input {
            flex: 1; padding: 12px 20px; min-width: 0;
            border-radius: 28px 0 0 28px;
            border: 2px solid var(--input-border);
            background: var(--input-bg); color: var(--text);
            font-size: 16px; outline: none;
            transition: border-color 0.2s;
        }
        .home-search input:focus { border-color: var(--link); }
        .home-search button {
            padding: 12px 20px; border-radius: 0 28px 28px 0;
            border: 2px solid var(--input-border); border-left: none;
            background: var(--bg-card); color: var(--text);
            cursor: pointer; font-size: 18px;
            transition: background 0.15s;
        }
        .home-search button:hover { background: rgba(128,128,128,0.2); }

        /* クイックリンク */
        .quick-links {
            display: flex; gap: 10px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 32px;
            animation: fadeInDown 1s ease;
        }
        .quick-link {
            padding: 8px 16px; border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text);
            text-decoration: none; font-size: 13px;
            transition: all 0.15s; display: flex; align-items: center; gap: 6px;
        }
        .quick-link:hover { background: var(--text); color: var(--bg); }

        /* アクセスカウンター */
        .access-card {
            background: var(--bg-card); border-radius: 12px;
            padding: 14px 24px; font-size: 13px; color: var(--text-sub);
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
            margin-bottom: 20px;
            animation: fadeInDown 1.1s ease;
        }
        .access-card span { display: flex; align-items: center; gap: 6px; }

        /* ウェルカムメッセージ */
        .welcome-msg {
            font-size: 13px; color: var(--text-sub);
            background: var(--bg-card); padding: 10px 20px;
            border-radius: 20px; border-left: 3px solid var(--link);
            max-width: 400px; line-height: 1.5;
            animation: fadeInDown 1.2s ease;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<header id="top-bar">
    <button id="hamburger-btn" onclick="toggleMenu()">☰</button>
    <a href="/"><img src="/img/logo/th.png" alt="Logo" id="top-logo"></a>
</header>

<div id="menu-overlay" onclick="closeMenu()"></div>
<div id="side-menu">
    <div class="side-menu-header">
        <button onclick="closeMenu()" style="background:none;border:none;cursor:pointer;color:var(--text);font-size:20px;">☰</button>
        <a href="/"><img src="/img/logo/th.png" alt="Logo" id="side-logo-img"></a>
    </div>
    <a class="side-menu-item" href="/"><span class="icon">🏠</span><span>ホーム</span></a>
    <a class="side-menu-item" href="/trending"><span class="icon">🔥</span><span>トレンド</span></a>
    <a class="side-menu-item" href="/history"><span class="icon">🕐</span><span>視聴履歴</span></a>
    <a class="side-menu-item" href="/subscriptions"><span class="icon">📺</span><span>登録チャンネル</span></a>
    <a class="side-menu-item" href="/settings"><span class="icon">⚙️</span><span>設定</span></a>
    <a class="side-menu-item" href="/others"><span class="icon">📋</span><span>メニュー</span></a>
    <a class="side-menu-item" href="/qanda"><span class="icon">❓</span><span>ヘルプ</span></a>
</div>

<div class="main">
    <h1 class="home-title">YouTube Plus<sup>+</sup></h1>
    <p class="home-subtitle">広告なし・プライバシー重視のYouTubeクライアント</p>

    <form class="home-search" action="/search" method="get"
          onsubmit="return document.getElementById('searchbox').value.trim() !== ''">
        <input id="searchbox" name="q" type="search"
               placeholder="動画・チャンネルを検索..."
               autocomplete="on" autofocus>
        <button type="submit">🔍</button>
    </form>

    <div class="quick-links">
        <a class="quick-link" href="/trending">🔥 トレンド</a>
        <a class="quick-link" href="/history">🕐 視聴履歴</a>
        <a class="quick-link" href="/subscriptions">📺 登録チャンネル</a>
        <a class="quick-link" href="/settings">⚙️ 設定</a>
    </div>

    <div class="access-card">
        <span>今日: <strong id="todayAccessCount">...</strong></span>
        <span>累計: <strong id="totalAccessCount">...</strong></span>
    </div>

    <div class="welcome-msg" id="welcome-msg">
        YouTube Plus<sup>+</sup>にようこそ！
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCC8u5IlLlQDQald9lgCq7RjH80GZI8Jbk",
    authDomain: "eviter-web.firebaseapp.com",
    databaseURL: "https://eviter-web-default-rtdb.firebaseio.com",
    projectId: "eviter-web",
    storageBucket: "eviter-web.firebasestorage.app",
    messagingSenderId: "385558603673",
    appId: "1:385558603673:web:bf8e6e2a719b5dbe761508",
    measurementId: "G-Z7TZ8CMYMQ"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const today = new Date().toISOString().split('T')[0];
const counterRef = ref(database, `accessCount/${today}`);
const totalCountRef = ref(database, 'accessCount/totalCount');
const urlRef = ref(database, 'hostedUrls');

function saveHostUrl() {
    const hostUrl = window.location.origin;
    get(urlRef).then((snapshot) => {
        const existingUrls = snapshot.exists() ? snapshot.val() : [];
        if (!existingUrls.includes(hostUrl)) {
            existingUrls.push(hostUrl);
            set(urlRef, existingUrls);
        }
    });
}

function incrementAccessCount() {
    get(counterRef).then((snapshot) => {
        let count = snapshot.exists() ? snapshot.val().count : 0;
        count++;
        set(counterRef, { count });
        document.getElementById('todayAccessCount').textContent = count + '回';
    });
    get(totalCountRef).then((snapshot) => {
        let total = snapshot.exists() ? snapshot.val().count : 0;
        total++;
        set(totalCountRef, { count: total });
        document.getElementById('totalAccessCount').textContent = total + '回';
    });
}

window.onload = function() {
    incrementAccessCount();
    saveHostUrl();
};
</script>

<script>
// ===== テーマ =====
let currentTheme = localStorage.getItem('theme') || 'system';
function applyTheme(theme) {
    const html = document.documentElement;
    if (theme === 'system') html.removeAttribute('data-theme');
    else html.setAttribute('data-theme', theme);
    const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    ['top-logo', 'side-logo-img', 'home-logo'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.mixBlendMode = isDark ? 'screen' : 'normal';
    });
}
applyTheme(currentTheme);
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => applyTheme(currentTheme));

// ===== サイドメニュー =====
function toggleMenu() {
    document.getElementById('side-menu').classList.toggle('open');
    document.getElementById('menu-overlay').classList.toggle('open');
}
function closeMenu() {
    document.getElementById('side-menu').classList.remove('open');
    document.getElementById('menu-overlay').classList.remove('open');
}

// ===== ウェルカムメッセージ =====
const messages = [
    'YouTube Plus<sup>+</sup>にようこそ！',
    '高画質機能追加！使い方はQ&Aをチェック',
    'Q&Aを見ると問題が解決するかも',
    '広告なしで快適に動画を楽しもう！',
];
let msgIndex = 0;
const msgEl = document.getElementById('welcome-msg');
setInterval(() => {
    msgEl.style.opacity = '0';
    setTimeout(() => {
        msgIndex = (msgIndex + 1) % messages.length;
        msgEl.innerHTML = messages[msgIndex];
        msgEl.style.opacity = '1';
    }, 500);
}, 5000);
</script>
</body>
</html>
