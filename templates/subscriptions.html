<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャンネル登録 - YouTube Plus⁺</title>
    <link rel="icon" href="/img/logo/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f9f9f9; --bg-card: #f2f2f2; --text: #0f0f0f;
            --text-sub: #606060; --topbar-bg: #ffffff;
            --topbar-shadow: 0 1px 3px rgba(0,0,0,0.15);
            --input-bg: #f2f2f2; --input-border: #ccc; --link: #065fd4;
            --border: rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f; --bg-card: #272727; --text: #ffffff;
                --text-sub: #aaaaaa; --topbar-bg: #212121;
                --topbar-shadow: 0 1px 3px rgba(0,0,0,0.5);
                --input-bg: #121212; --input-border: #444; --link: #3ea6ff;
                --border: rgba(255,255,255,0.1);
            }
        }
        html[data-theme="light"] {
            --bg: #f9f9f9; --bg-card: #f2f2f2; --text: #0f0f0f;
            --text-sub: #606060; --topbar-bg: #ffffff; --link: #065fd4;
            --border: rgba(0,0,0,0.1); color-scheme: light;
        }
        html[data-theme="dark"] {
            --bg: #0f0f0f; --bg-card: #272727; --text: #ffffff;
            --text-sub: #aaaaaa; --topbar-bg: #212121; --link: #3ea6ff;
            --border: rgba(255,255,255,0.1); color-scheme: dark;
        }
        body { font-family: Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* トップバー */
        #top-bar {
            display: flex; align-items: center; gap: 8px;
            background: var(--topbar-bg); height: 56px; padding: 0 12px;
            box-shadow: var(--topbar-shadow);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }
        #top-bar img { height: 28px; }
        #top-bar a { text-decoration: none; }

        /* タブ */
        .tabs {
            display: flex; gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
            position: sticky; top: 56px; background: var(--bg); z-index: 100;
        }
        .tab-btn {
            padding: 12px 20px; border: none; background: none;
            color: var(--text-sub); font-size: 14px; cursor: pointer;
            border-bottom: 2px solid transparent; font-weight: 500;
            transition: color 0.15s;
        }
        .tab-btn.active {
            color: var(--text); border-bottom-color: var(--text);
        }
        .tab-btn:hover { color: var(--text); }

        .main { margin-top: 56px; padding: 0 12px 16px; max-width: 1200px; }

        /* タブコンテンツ */
        .tab-content { display: none; padding-top: 16px; }
        .tab-content.active { display: block; }

        /* 新着動画グリッド */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .video-card {
            cursor: pointer; border-radius: 8px; overflow: hidden;
            background: var(--bg-card);
            transition: background 0.15s;
        }
        .video-card:hover { background: var(--bg-card); filter: brightness(1.1); }
        .video-card a { text-decoration: none; color: var(--text); display: block; }
        .thumb-wrap { position: relative; }
        .thumb-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .thumb-length {
            position: absolute; bottom: 6px; right: 6px;
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 2px 6px; border-radius: 3px; font-size: 12px;
        }
        .video-card-info { padding: 10px; }
        .video-card-info h4 {
            font-size: 14px; line-height: 1.4; margin-bottom: 4px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .video-card-info .ch-name { font-size: 12px; color: var(--text-sub); margin-bottom: 2px; }
        .video-card-info .meta { font-size: 12px; color: var(--text-sub); }

        /* チャンネル一覧 */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .channel-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 16px; border-radius: 8px; background: var(--bg-card);
            text-align: center;
        }
        .channel-card img {
            width: 64px; height: 64px; border-radius: 50%;
            margin-bottom: 8px; object-fit: cover;
        }
        .channel-card a {
            color: var(--text); text-decoration: none;
            font-size: 14px; font-weight: 500; margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 1;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .channel-card a:hover { color: var(--link); }
        .unsub-btn {
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid var(--border);
            background: none; color: var(--text-sub);
            cursor: pointer; font-size: 12px;
        }
        .unsub-btn:hover { background: rgba(128,128,128,0.15); }

        /* アクションバー */
        .action-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .action-btn {
            padding: 7px 14px; border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text);
            cursor: pointer; font-size: 13px;
        }
        .action-btn:hover { background: rgba(128,128,128,0.15); }

        .empty { text-align: center; padding: 60px; color: var(--text-sub); }
        .loading { text-align: center; padding: 30px; color: var(--text-sub); }

        @media (max-width: 600px) {
            .videos-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
            .channels-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>
<header id="top-bar">
    <a href="/"><img src="/img/logo/th.png" alt="Logo" id="logo-img"></a>
    <span style="font-size:16px; font-weight:bold;">チャンネル登録</span>
</header>

<div class="main">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('videos')">🎬 新着動画</button>
        <button class="tab-btn" onclick="switchTab('channels')">📺 チャンネル</button>
    </div>

    <!-- 新着動画タブ -->
    <div class="tab-content active" id="tab-videos">
        <div id="videos-list" class="videos-grid">
            <div class="loading">読み込み中...</div>
        </div>
    </div>

    <!-- チャンネル一覧タブ -->
    <div class="tab-content" id="tab-channels">
        <div class="action-bar">
            <button class="action-btn" onclick="exportSubs()">📤 エクスポート</button>
            <button class="action-btn" onclick="document.getElementById('import-file').click()">📥 インポート</button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importSubs(event)">
        </div>
        <div id="channel-list" class="channels-grid"></div>
    </div>
</div>

<script>
// ===== テーマ =====
let currentTheme = localStorage.getItem('theme') || 'system';
function setTheme(theme) {
    const html = document.documentElement;
    if (theme === 'system') html.removeAttribute('data-theme');
    else html.setAttribute('data-theme', theme);
    const logo = document.getElementById('logo-img');
    if (logo) {
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        logo.style.mixBlendMode = isDark ? 'screen' : 'normal';
    }
}
setTheme(currentTheme);

// ===== タブ =====
function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
}

// ===== 登録データ =====
function getSubscriptions() {
    return JSON.parse(localStorage.getItem('subscriptions') || '[]');
}
function saveSubscriptions(subs) {
    localStorage.setItem('subscriptions', JSON.stringify(subs));
}

// ===== チャンネル一覧レンダリング =====
function renderChannels() {
    const subs = getSubscriptions();
    const list = document.getElementById('channel-list');
    if (subs.length === 0) {
        list.innerHTML = '<div class="empty" style="grid-column:1/-1;">登録チャンネルはありません</div>';
        return;
    }
    list.innerHTML = subs.map(s => `
        <div class="channel-card">
            <img src="${s.icon}" onerror="this.src='/img/logo/th.png'" alt="${s.name}">
            <a href="/channel/${s.id}">${s.name}</a>
            <button class="unsub-btn" onclick="unsubscribe('${s.id}')">登録解除</button>
        </div>
    `).join('');
}

function unsubscribe(channelId) {
    saveSubscriptions(getSubscriptions().filter(s => s.id !== channelId));
    renderChannels();
    loadVideos(); // 動画も更新
}

// ===== 新着動画読み込み =====
async function loadVideos() {
    const subs = getSubscriptions();
    const container = document.getElementById('videos-list');

    if (subs.length === 0) {
        container.innerHTML = '<div class="empty" style="grid-column:1/-1;">チャンネルを登録すると新着動画が表示されます</div>';
        return;
    }

    container.innerHTML = '<div class="loading" style="grid-column:1/-1;">新着動画を読み込み中...</div>';

    // 各チャンネルの動画を並行取得
    const results = await Promise.allSettled(
        subs.map(s => fetch(`/api/channel_videos/${s.id}`).then(r => r.json()))
    );

    let allVideos = [];
    results.forEach(r => {
        if (r.status === 'fulfilled' && r.value.videos) {
            allVideos = allVideos.concat(r.value.videos);
        }
    });

    // 新しい順に並べる
    allVideos.sort((a, b) => (b.published || 0) - (a.published || 0));

    if (allVideos.length === 0) {
        container.innerHTML = '<div class="empty" style="grid-column:1/-1;">動画が取得できませんでした</div>';
        return;
    }

    container.innerHTML = allVideos.map(v => `
        <div class="video-card">
            <a href="/watch?v=${v.id}">
                <div class="thumb-wrap">
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy" alt="${v.title}">
                    <span class="thumb-length">${v.length}</span>
                </div>
                <div class="video-card-info">
                    <h4>${escHtml(v.title)}</h4>
                    <p class="ch-name">${escHtml(v.author)}</p>
                    <p class="meta">${v.view_count_text} · ${v.published_text}</p>
                </div>
            </a>
        </div>
    `).join('');
}

function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== エクスポート/インポート =====
function exportSubs() {
    const blob = new Blob([JSON.stringify(getSubscriptions(), null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'subscriptions.json';
    a.click();
}

function importSubs(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data)) {
                const existing = getSubscriptions();
                const merged = [...existing];
                data.forEach(s => { if (!merged.some(m => m.id === s.id)) merged.push(s); });
                saveSubscriptions(merged);
                renderChannels();
                loadVideos();
                alert(`${data.length}件インポートしました！`);
            }
        } catch { alert('ファイルが正しくありません'); }
    };
    reader.readAsText(file);
}

// 初期化
renderChannels();
loadVideos();
</script>
</body>
</html>
