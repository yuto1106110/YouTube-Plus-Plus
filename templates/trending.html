<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレンド - YouTube Plus⁺</title>
    <link rel="icon" href="/img/logo/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f9f9f9; --bg-card: #f2f2f2; --text: #0f0f0f;
            --text-sub: #606060; --topbar-bg: #ffffff;
            --topbar-shadow: 0 1px 3px rgba(0,0,0,0.15);
            --input-bg: #f2f2f2; --input-border: #ccc; --link: #065fd4;
            --border: rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f; --bg-card: #272727; --text: #ffffff;
                --text-sub: #aaaaaa; --topbar-bg: #212121;
                --topbar-shadow: 0 1px 3px rgba(0,0,0,0.5);
                --input-bg: #121212; --input-border: #444; --link: #3ea6ff;
                --border: rgba(255,255,255,0.1);
            }
        }
        html[data-theme="light"] {
            --bg: #f9f9f9; --bg-card: #f2f2f2; --text: #0f0f0f;
            --text-sub: #606060; --topbar-bg: #ffffff; --link: #065fd4;
            --border: rgba(0,0,0,0.1); color-scheme: light;
        }
        html[data-theme="dark"] {
            --bg: #0f0f0f; --bg-card: #272727; --text: #ffffff;
            --text-sub: #aaaaaa; --topbar-bg: #212121; --link: #3ea6ff;
            --border: rgba(255,255,255,0.1); color-scheme: dark;
        }
        body { font-family: Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        #top-bar {
            display: flex; align-items: center; gap: 8px;
            background: var(--topbar-bg); height: 56px; padding: 0 12px;
            box-shadow: var(--topbar-shadow);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }
        /* ハンバーガーメニュー */
#hamburger-btn {
    flex-shrink: 0; background: none; border: none;
    cursor: pointer; padding: 6px; color: var(--text);
    font-size: 20px; border-radius: 6px;
}
#hamburger-btn:hover { background: rgba(128,128,128,0.15); }

#side-menu {
    position: fixed; top: 0; left: -260px; width: 260px; height: 100vh;
    background: var(--topbar-bg); z-index: 2000;
    box-shadow: 2px 0 16px rgba(0,0,0,0.3);
    transition: left 0.25s ease;
    display: flex; flex-direction: column;
}
#side-menu.open { left: 0; }

#menu-overlay {
    display: none; position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.4); z-index: 1999;
}
#menu-overlay.open { display: block; }

.side-menu-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; height: 56px;
    border-bottom: 1px solid var(--border);
}
.side-menu-header img { height: 28px; }

.side-menu-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; color: var(--text);
    text-decoration: none; font-size: 14px;
    transition: background 0.15s;
}
.side-menu-item:hover { background: rgba(128,128,128,0.1); }
.side-menu-item .icon { font-size: 20px; width: 24px; text-align: center; }
        #top-bar img { height: 28px; }
        .search-container { flex: 1; max-width: 480px; }
        .search-container form { display: flex; width: 100%; }
        .search-container input {
            flex: 1; padding: 6px 12px; min-width: 0;
            border-radius: 20px 0 0 20px;
            border: 1px solid var(--input-border);
            background: var(--input-bg); color: var(--text);
            font-size: 14px; outline: none;
        }
        .search-container button {
            padding: 6px 12px; border-radius: 0 20px 20px 0;
            border: 1px solid var(--input-border); border-left: none;
            background: var(--bg-card); color: var(--text);
            cursor: pointer; font-size: 14px;
        }

        .main { margin-top: 56px; padding: 0 12px 16px; }

        /* タブ */
        .tabs {
            display: flex; border-bottom: 1px solid var(--border);
            position: sticky; top: 56px; background: var(--bg); z-index: 100;
            overflow-x: auto;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 12px 16px; border: none; background: none;
            color: var(--text-sub); font-size: 14px; cursor: pointer;
            border-bottom: 2px solid transparent; font-weight: 500;
            white-space: nowrap; flex-shrink: 0;
        }
        .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

        /* フィルターバー */
        .filter-bar {
            display: flex; gap: 8px; padding: 12px 0;
            overflow-x: auto; flex-wrap: nowrap;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text);
            cursor: pointer; font-size: 13px; white-space: nowrap; flex-shrink: 0;
            transition: background 0.15s;
        }
        .filter-chip.active {
            background: var(--text); color: var(--bg);
            border-color: var(--text);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* グリッド */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px; padding-top: 8px;
        }
        .video-card { border-radius: 8px; overflow: hidden; background: var(--bg-card); }
        .video-card a { text-decoration: none; color: var(--text); display: block; }
        .video-card:hover { filter: brightness(1.08); }
        .thumb-wrap { position: relative; }
        .thumb-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .thumb-length {
            position: absolute; bottom: 6px; right: 6px;
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 2px 6px; border-radius: 3px; font-size: 12px;
        }
        .thumb-rank {
            position: absolute; top: 6px; left: 6px;
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 2px 8px; border-radius: 3px; font-size: 13px; font-weight: bold;
        }
        .card-info { padding: 10px; }
        .card-info h4 {
            font-size: 14px; line-height: 1.4; margin-bottom: 4px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-info .ch { font-size: 12px; color: var(--text-sub); margin-bottom: 2px; }
        .card-info .meta { font-size: 12px; color: var(--text-sub); }
        .play-count {
            display: inline-block; margin-top: 4px;
            font-size: 11px; color: #fff;
            background: #ff0000; padding: 2px 6px; border-radius: 10px;
        }

        .empty { text-align: center; padding: 60px; color: var(--text-sub); grid-column: 1/-1; }
        .loading { text-align: center; padding: 40px; color: var(--text-sub); grid-column: 1/-1; }

        @media (max-width: 600px) {
            .videos-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        }
        .main { 
    margin-top: 56px; padding: 12px 16px;
    max-width: 1280px; margin-left: auto; margin-right: auto;
        }
    </style>
</head>
<body>

<header id="top-bar">
    <button id="hamburger-btn" onclick="toggleMenu()">☰</button>
    <div class="search-container">
        <form action="/search" method="get" onsubmit="return document.getElementById('sq').value.trim() !== ''">
            <input id="sq" name="q" type="search" placeholder="検索" autocomplete="on">
            <button type="submit">🔍</button>
        </form>
    </div>
</header>

<div class="main">
    <!-- タブ -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('youtube', this)">📺 YouTubeトレンド</button>
        <button class="tab-btn" onclick="switchTab('site', this)">🔥 サイトトレンド</button>
    </div>

    <!-- YouTubeトレンド -->
    <div class="tab-content active" id="tab-youtube">
        <div class="filter-bar">
            <span class="filter-chip active" onclick="setCategory('default', this)">🌐 全体</span>
            <span class="filter-chip" onclick="setCategory('gaming', this)">🎮 ゲーム</span>
            <span class="filter-chip" onclick="setCategory('music', this)">🎵 音楽</span>
            <span class="filter-chip" onclick="setCategory('movies', this)">🎬 映画</span>
            <span class="filter-chip" onclick="setCategory('news', this)">📰 ニュース</span>
        </div>
        <div id="youtube-list" class="videos-grid">
            <div class="loading">読み込み中...</div>
        </div>
    </div>

    <!-- サイトトレンド -->
    <div class="tab-content" id="tab-site">
        <div class="filter-bar">
            <span class="filter-chip active" onclick="setPeriod('24h', this)">⏱ 24時間</span>
            <span class="filter-chip" onclick="setPeriod('7days', this)">📅 7日間</span>
            <span class="filter-chip" onclick="setPeriod('30days', this)">📆 30日間</span>
        </div>
        <div id="site-list" class="videos-grid">
            <div class="loading">読み込み中...</div>
        </div>
    </div>
</div>

<!-- オーバーレイ -->
<div id="menu-overlay" onclick="closeMenu()"></div>

<!-- サイドメニュー -->
<div id="side-menu">
    <div class="side-menu-header">
        <button onclick="closeMenu()" style="background:none;border:none;cursor:pointer;color:var(--text);font-size:20px;">☰</button>
        <a href="/"><img src="/img/logo/th.png" alt="Logo" id="side-logo-img"></a>
    </div>
    <a class="side-menu-item" href="/">
        <span class="icon">🏠</span><span>ホーム</span>
    </a>
    <a class="side-menu-item" href="/trending">
        <span class="icon">🔥</span><span>トレンド</span>
    </a>
    <a class="side-menu-item" href="/history">
        <span class="icon">🕐</span><span>視聴履歴</span>
    </a>
    <a class="side-menu-item" href="/subscriptions">
        <span class="icon">📺</span><span>チャンネル登録</span>
    </a>
    <a class="side-menu-item" href="/settings">
        <span class="icon">⚙️</span><span>設定</span>
    </a>
</div>    

<script>
// ===== テーマ =====
let currentTheme = localStorage.getItem('theme') || 'system';
function applyTheme(theme) {
    const html = document.documentElement;
    if (theme === 'system') html.removeAttribute('data-theme');
    else html.setAttribute('data-theme', theme);
    const logo = document.getElementById('logo-img');
    if (logo) {
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        logo.style.mixBlendMode = isDark ? 'screen' : 'normal';
    }
}
applyTheme(currentTheme);

let currentCategory = 'default';
let currentPeriod = '24h';
let currentTab = 'youtube';

// ===== タブ =====
function switchTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    currentTab = name;
    if (name === 'site') loadSiteTrend();
}

function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== カテゴリ切り替え =====
function setCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll('#tab-youtube .filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    loadYoutubeTrend();
}

// ===== 期間切り替え =====
function setPeriod(period, el) {
    currentSitePeriod = period;
    document.querySelectorAll('#tab-site .filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    loadSiteTrend();
}

// ===== YouTubeトレンド（Invidious） =====
async function loadYoutubeTrend() {
    const container = document.getElementById('youtube-list');
    container.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
        const res = await fetch(`/api/trending?category=${currentCategory}`);
        const data = await res.json();
        if (!data.videos || data.videos.length === 0) {
            container.innerHTML = '<div class="empty">取得できませんでした</div>';
            return;
        }
        container.innerHTML = data.videos.map((v, i) => `
            <div class="video-card">
                <a href="/watch?v=${v.id}">
                    <div class="thumb-wrap">
                        <img src="${v.thumbnail}" loading="lazy" alt="${escHtml(v.title)}">
                        <span class="thumb-length">${v.length}</span>
                        <span class="thumb-rank">#${i + 1}</span>
                    </div>
                    <div class="card-info">
                        <h4>${escHtml(v.title)}</h4>
                        <p class="ch">${escHtml(v.author)}</p>
                        <p class="meta">${v.view_count_text}回視聴 · ${v.published_text}</p>
                    </div>
                </a>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<div class="empty">読み込みに失敗しました</div>';
    }
}

// ===== サイトトレンド（Vercel API） =====
let currentSitePeriod = '24h';

async function loadSiteTrend() {
    const container = document.getElementById('site-list');
    container.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
        const res = await fetch(`/api/site_trending?period=${currentSitePeriod}`);
        const data = await res.json();
        if (!data.videos || data.videos.length === 0) {
            container.innerHTML = '<div class="empty">まだデータがありません。動画を見るとここに表示されます！</div>';
            return;
        }
        container.innerHTML = data.videos.map((v, i) => `
            <div class="video-card">
                <a href="/watch?v=${v.video_id}">
                    <div class="thumb-wrap">
                        <img src="${v.thumbnail}" loading="lazy" alt="${escHtml(v.title)}">
                        <span class="thumb-length">${v.length || ''}</span>
                        <span class="thumb-rank">#${i + 1}</span>
                    </div>
                    <div class="card-info">
                        <h4>${escHtml(v.title)}</h4>
                        <p class="ch">${escHtml(v.author || '')}</p>
                        <span class="play-count">👁 ${v.count}回再生</span>
                    </div>
                </a>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<div class="empty">読み込みに失敗しました</div>';
    }
}

loadYoutubeTrend();

// ===== サイドメニュー =====
function toggleMenu() {
    document.getElementById('side-menu').classList.toggle('open');
    document.getElementById('menu-overlay').classList.toggle('open');
}
function closeMenu() {
    document.getElementById('side-menu').classList.remove('open');
    document.getElementById('menu-overlay').classList.remove('open');
}
// サイドメニューのロゴもテーマ適用
function updateAllLogos() {
    const isDark = currentTheme === 'dark' ||
        (currentTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    ['logo-img', 'side-logo-img'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.mixBlendMode = isDark ? 'screen' : 'normal';
    });
}    
</script>
</body>
</html>
